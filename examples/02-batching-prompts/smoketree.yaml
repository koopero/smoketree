name: batching-prompts

defaults:
  max_iterations: 100
  ollama_url: http://localhost:11434

# Fan one prompt template across many inputs = batching. Each {item} discovered under
# sources/ becomes one model call. The project is the graph: rules live in smoketree.yaml.
rules:
  - name: blurb
    model: writer_ollama          # flip the model: lines below to switch backend
    # model: writer_claude
    # model: writer_openai
    in:
      topic: "sources/item/{item}/topic.txt"
    out:
      blurb: "work/item/{item}/blurb.txt"
    config:
      prompt: |
        Write a single-sentence product blurb for the following item.
        Reply with only the sentence, no preamble.

        Item: {{ topic }}

# One named def per backend. The rule picks one with `model:`; the others stay valid and
# ready — switching providers is a one-line change, not a rewrite.
models:
  writer_ollama:
    backend: ollama
    model: gemma4:latest          # local, no key, no cost (needs `ollama serve`)
  writer_claude:
    backend: claude
    model: claude-opus-4-8        # needs ANTHROPIC_API_KEY
  writer_openai:
    backend: openai
    model: gpt-5.1                # needs OPENAI_API_KEY
