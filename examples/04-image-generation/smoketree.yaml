name: image-generation

defaults:
  max_iterations: 100
  ollama_url: http://localhost:11434
  comfyui_url: http://localhost:8188

rules:
  # map: one LLM call per concept -> a detailed image prompt.
  - name: prompt
    model: writer_ollama          # flip the model: line below to switch backend
    # model: writer_openai
    in:
      idea: "sources/concept/{concept}/idea.txt"
    out:
      prompt: "work/concept/{concept}/prompt.txt"
    config:
      prompt: |
        Expand this concept into ONE vivid image-generation prompt: a single
        paragraph of concrete visual detail (subject, setting, lighting, style).
        Reply with only the prompt, no preamble.

        Concept: {{ idea }}

  # map: render each prompt to an image. The prompt rule feeds this one automatically.
  - name: render
    model: renderer_comfyui        # flip the model: line below to render in the cloud
    # model: renderer_openai
    in:
      prompt: "work/concept/{concept}/prompt.txt"
    out:
      image: "work/concept/{concept}/image.png"

# One named def per backend, per step. Each rule picks one with `model:`; the alternatives
# stay valid, so switching a step's backend is a one-line change.
models:
  # Step 1 — write the image prompt.
  writer_ollama:
    backend: ollama
    model: gemma4:latest
  writer_openai:
    backend: openai
    model: gpt-5.1                 # needs OPENAI_API_KEY

  # Step 2 — render the image.
  renderer_comfyui:
    backend: comfyui
    workflow: workflows/txt2img.json
    seed_inject: { node: "3", field: seed }
    inputs:  { prompt: { node: "6", field: text } }
    outputs: { image: { node: "9" } }
  renderer_openai:
    backend: openai_image
    model: gpt-image-1             # needs OPENAI_API_KEY
    size: "1024x1024"
    prompt: "{{ prompt }}"         # openai_image builds its prompt from the input
